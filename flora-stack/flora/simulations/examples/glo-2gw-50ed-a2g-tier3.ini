# GLo-MAPPO closed-loop co-simulation -- TIER 3 (FLoRa native Oulu terrestrial model).
# The MARL policy is fed FLoRa's own Oulu log-normal path loss (LoRaPathLossOulu:
# PL = B + 10*n*log10(d/d0) - antennaGain + N(0, sigma)). Oulu is a GROUND-to-GROUND
# empirical model (measured at ground level), so applying it to a 150 m UAV air-to-ground
# link overestimates path loss by ~30 dB and collapses the achievable rate/EE. This tier is
# INTENTIONAL: it demonstrates that a terrestrial model is the WRONG propagation class for
# this scenario -- an honest negative result that justifies the A2G modelling choice.
#
# Thin wrapper over the auto-generated base scenario: overrides ONLY the tier selector and
# output filenames (before the include -> OMNeT++ ini is first-match-wins). Oulu params
# default to FLoRa's LoRaPathLossOulu values (d0=1000, n=2.32, B=128.95, sigma=7.8, antGain=2).
# Start the Python policy server + env bridge BEFORE running this.

[General]
output-scalar-file = ../results/glo-2gw-50ed-a2g-tier3-s${runnumber}.ini.sca
output-vector-file = ../results/glo-2gw-50ed-a2g-tier3-s${runnumber}.ini.vec
**.marlController.channelTier = 3    # FLoRa native Oulu terrestrial model (mismatch demo)
# **.marlController.ouluSigma = 7.8  # uncomment to change Oulu shadowing std [dB]
repeat = 10                          # 10 runs (0..9), each a distinct seed-set

include marl-2gw-50ed-a2g.ini
