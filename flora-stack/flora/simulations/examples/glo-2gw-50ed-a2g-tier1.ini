# GLo-MAPPO closed-loop co-simulation -- TIER 1 (analytic A2G channel).
# The MARL policy is fed the deterministic Al-Hourani A2G gain (a port of
# multi_lora.py::compute_pathloss). Validates INTEGRATION FIDELITY: the closed loop
# should reproduce the pure-Python simulation almost exactly (~0% discrepancy).
#
# Thin wrapper over the auto-generated base scenario: overrides ONLY the tier selector
# and the output filenames (placed before the include -> OMNeT++ ini is first-match-wins).
# Start the Python policy server + env bridge BEFORE running this.

[General]
output-scalar-file = ../results/glo-2gw-50ed-a2g-tier1-s${runnumber}.ini.sca
output-vector-file = ../results/glo-2gw-50ed-a2g-tier1-s${runnumber}.ini.vec
**.marlController.channelTier = 1    # analytic A2G (Tier-1, deterministic)
repeat = 10                          # 10 runs (0..9), each a distinct seed-set -> 10 episodes

include marl-2gw-50ed-a2g.ini
