# GLo-MAPPO base scenario: MarlController drives 2 UAV gateways + per-node SF/TP for 50 LoRa nodes.
# MARL full-mirror: MarlController drives gateway trajectories + per-node SF/TP.
# Start the Python policy server (policy_server.py) BEFORE running this.

[General]
network = flora.simulations.MarlLoRaNetwork
# INET ships the drone/UAV icons in its own images dir, which ./run does not add
# to the image path; register both image dirs here so misc/drone resolves (no '?' icon).
# Paths are relative to flora/simulations -- adjust if your toolchain lives elsewhere.
# (After `source use_flora.sh` the environment usually resolves these already, so you
#  may simply delete this line, as the glo-*.ini tier files do.)
image-path = "../../omnetpp-6.0.3/images;../../inet4.4/images"
output-scalar-file = ../results/marl-2gw-50ed-a2g-s${runnumber}.ini.sca
output-vector-file = ../results/marl-2gw-50ed-a2g-s${runnumber}.ini.vec
**.maxTransmissionDuration = 4s
**.energyDetection = -110dBm
rng-class = "cMersenneTwister"

# ---- RESULT RECORDING: keep ONLY reportable metrics; drop INET/radio clutter ----
# FLoRa's recordScalar() customs survive (scalar-recording stays on): LoRa_NS_DER,
# finalSF/finalTP, totalEnergyConsumed, sentPackets, numReceivedFromNode*, per-SF
# counters. We drop the @statistic clutter (radio SNIR/PER/BER histograms, radio-mode
# vectors, INET stack signals) and all vectors, then re-enable just 2 time-series.
**.scalar-recording = true
**.bin-recording = false
**.param-recording = false
**.statistic-recording = false
**.vector-recording = false
# -- reportable @statistic counts/vectors to KEEP --
**.loRaNodes[*].**.LoRaReceptionCollision.statistic-recording = true            # packet collisions (count)
**.networkServer.**.LoRa_ServerPacketReceived.statistic-recording = true
**.networkServer.**.LoRa_ServerPacketReceived.result-recording-modes = count,vector   # received/DER over time
**.loRaNodes[*].IdealEpEnergyStorage.powerConsumption.statistic-recording = true
**.loRaNodes[*].IdealEpEnergyStorage.powerConsumption.result-recording-modes = vector  # power(t) -> energy(t)

# ---- gateways: packet forwarders (one per GW) ----
**.loRaGW[*].numUdpApps = 1
**.loRaGW[*].packetForwarder.localPort = 2000
**.loRaGW[*].packetForwarder.destPort = 1000
**.loRaGW[*].packetForwarder.destAddresses = "networkServer"
**.loRaGW[0].packetForwarder.indexNumber = 0
**.loRaGW[1].packetForwarder.indexNumber = 1

# ---- network server: ADR DISABLED (MarlController owns SF/TP) ----
**.networkServer.numApps = 1
**.networkServer.**.evaluateADRinServer = false
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].destAddresses = "loRaGW[0]"
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].adrMethod = "avg"

**.numberOfPacketsToSend = 0
sim-time-limit = 1d
simtime-resolution = -11
repeat = 1

# *** THE main speed/traffic knob ***  FLoRa's cost is dominated by the medium's
# SINR/interference integration over CONCURRENT transmissions (LoRa airtimes are long
# and the LoRa range covers the whole field, so spatial filtering does NOT help). Denser
# traffic => more overlap => super-linear slowdown. Sparser => faster but fewer packets.
#   exp(10s)  : lively but heavy (20-90 s spikes per step during bursts)
#   exp(20-40s): balanced (default)        exp(>=60s): fast, but sparse over a short episode
**.timeToFirstPacket = exponential(20s)
**.timeToNextPacket = exponential(40s)
**.alohaChannelModel = false

# ---- nodes: ADR disabled; SF/TP set at runtime by the controller ----
**.loRaNodes[*].**.initFromDisplayString = false
**.loRaNodes[*].**.evaluateADRinNode = false
**.loRaNodes[*].**initialLoRaBW = 125 kHz
**.loRaNodes[*].**initialLoRaCR = 4
**.loRaNodes[*].numApps = 1
**.loRaNodes[*].app[0].typename = "SimpleLoRaApp"
# safe defaults before the first control tick (controller overrides these):
**.loRaNodes[*].**initialLoRaSF = 12
**.loRaNodes[*].**initialLoRaTP = 14dBm

# ---- gateway radio / mobility ----
**.LoRaGWNic.radio.iAmGateway = true
**.loRaGW[*].**.initFromDisplayString = false

# ---- energy ----
**.loRaNodes[*].LoRaNic.radio.energyConsumer.typename = "LoRaEnergyConsumer"
**.loRaNodes[*].**.energySourceModule = "^.IdealEpEnergyStorage"
**.loRaNodes[*].LoRaNic.radio.energyConsumer.configFile = xmldoc("../energyConsumptionParameters.xml")

# ---- channel / area ----
**.sigma = 3.57
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMaxY = 1000m
**.constraintAreaMaxZ = 200m
MarlLoRaNetwork.**.radio.separateTransmissionParts = false
MarlLoRaNetwork.**.radio.separateReceptionParts = false
**.ipv4Delayer.config = xmldoc("../cloudDelays.xml")
**.radio.radioMediumModule = "LoRaMedium"
# Channel model. "LoRaLogNormalShadowing" = standard log-normal; "LoRaPathLossOulu"
# = measurement-derived model from the Oulu LoRa field measurements (Petajajarvi et al.)
# used for realistic-channel validation. "LoRaHataOkumura" also available.
**.LoRaMedium.pathLossType = "LoRaLogNormalShadowing"
**.minInterferenceTime = 0s
**.displayAddresses = false

# --- PERFORMANCE: spatial pruning of the O(N^2) reception/interference compute ---
# Without this the medium computes a reception (path loss) for EVERY transmitter x
# EVERY radio and tracks all of them as interferers. communicationRange filtering
# skips pairs beyond the max LoRa range. It is mobility-safe: it uses the radios'
# current positions and a constant max-range limit (no stale neighbour cache).
**.LoRaMedium.mediumLimitCacheType = "LoRaMediumCache"
**.LoRaMedium.rangeFilter = "communicationRange"

# ---- MARL controller (talks to policy_server.py) ----
**.marlController.serverHost = "127.0.0.1"
**.marlController.serverPort = 5000
**.marlController.deltaT = 0.5
**.marlController.uavAltitude = 150.0
**.marlController.closedLoop = true   # extended protocol -> env_bridge.py
**.marlController.commRange = 300.0
**.marlController.frequency = 868000000.0   # A2G gain fed to the policy

**.numberOfNodes = 50
**.numberOfGateways = 2


# ---- gateway initial positions (y flipped for display) ----
**.loRaGW[0].**.initialX = 50.00m
**.loRaGW[0].**.initialY = 950.00m
**.loRaGW[0].**.initialZ = 150.00m
**.loRaGW[1].**.initialX = 150.00m
**.loRaGW[1].**.initialY = 950.00m
**.loRaGW[1].**.initialZ = 150.00m

