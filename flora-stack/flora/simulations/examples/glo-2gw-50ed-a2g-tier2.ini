# GLo-MAPPO closed-loop co-simulation -- TIER 2 (A2G mean + log-normal shadowing).
# The MARL policy is fed the analytic air-to-ground gain PLUS an independent log-normal
# shadowing term:  PL = PL_a2g(d) + N(0, shadowSigmaDb).  Same (correct) A2G propagation
# class as Tier-1, but with realistic per-slot channel randomness the deterministic Python
# model lacks -> a few-% discrepancy with variance = robustness-to-real-channel validation.
#
# Thin wrapper over the auto-generated base scenario: overrides ONLY the tier selector,
# shadowing std, and output filenames (before the include -> OMNeT++ ini is first-match-wins).
# Start the Python policy server + env bridge BEFORE running this.

[General]
output-scalar-file = ../results/glo-2gw-50ed-a2g-tier2-s${runnumber}.ini.sca
output-vector-file = ../results/glo-2gw-50ed-a2g-tier2-s${runnumber}.ini.vec
**.marlController.channelTier = 2    # A2G + log-normal shadowing (Tier-2, stochastic)
**.marlController.shadowSigmaDb = 8.0  # shadowing std [dB]; tune for your A2G environment
repeat = 10                          # 10 runs (0..9), each a distinct seed-set -> 10 shadowing realizations

include marl-2gw-50ed-a2g.ini
