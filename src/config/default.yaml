# --- Defaults ---

# --- pymarl options ---
runner: "parallel" # Runs 1 env for an episode else, parallel for t_max

mac: "basic_mac" # Basic controller
env: "gymma" # Environment name (LoRa env via the gymma wrapper)
common_reward: True  # Run experiment with common reward setup
reward_scalarisation: "sum" #"mean"  # How to aggregate rewards to single common reward (only used if common_reward is True)
env_args: {} # Arguments for the environment
batch_size_run: 5 # Number of environments to run in parallel - initially, i'm using 20
test_nepisode: 10 # Number of episodes to test for
test_interval: 2000 # Test after {} timesteps have passed
test_greedy: True # Use greedy evaluation (if False, will set epsilon floor to 0
log_interval: 2000 # Log summary of stats after every {} timesteps
runner_log_interval: 2000 # Log runner stats (not test stats) every {} timesteps
learner_log_interval: 2000 # Log training stats every {} timesteps
t_max: 10000 # Stop running after this many timesteps
use_cuda: True # Use gpu by default unless it isn't available
buffer_cpu_only: True # If true we won't keep all of the replay buffer in vram

# --- Logging options ---
use_tensorboard: True # False # Log results to tensorboard
use_wandb: False # Log results to W&B
wandb_team: aiman2020-um6p #null # W&B team name
wandb_project: Flying_LoRa_Static_UAVs #null # W&B project name
wandb_mode: "online" # "offline" # W&B mode (online/offline)
wandb_save_model: True #False # Save models to W&B (only done if use_wandb is True and save_model is True)

save_model: True # Save the models to disk
# save_model_interval: 500000 # Save models after this many timesteps
save_model_interval: 999999999  # only save at the end
checkpoint_path: "" # Load a checkpoint from this path (e.g. models/glo_ed50_seed41)
evaluate: False # False # Evaluate model for test_nepisode episodes and quit (no training)
render: False # Render the environment when evaluating (only when evaluate == True)
load_step: 0 # Load model trained on this many timesteps (0 if choose max possible)
save_replay: False # Saving the replay of the model loaded from checkpoint_path
local_results_path: "results" # Path for local results

# --- episode trajectory/plot saving (runners) ---
save_episode_data: True   # save trajectory plots + CSVs at episode end
save_train_interval: 20   # save a train episode every N train episodes
save_test_interval: 20    # save a test episode every N test episodes

# --- RL hyperparameters ---
gamma: 0.99
batch_size: 32 # Number of episodes to train on
buffer_size: 32 # Size of the replay buffer
lr: 0.0005 # Learning rate for agents
lr_decay: False # linear t_env-based LR decay (ppo_learner): lr0 -> lr0*lr_decay_min_frac over lr_decay_steps
lr_decay_min_frac: 0.1 # final LR as a fraction of the starting LR
lr_decay_steps: 0 # 0 => use t_max as the decay horizon
optim_alpha: 0.99 # RMSProp alpha
optim_eps: 0.00001 # RMSProp epsilon
grad_norm_clip: 10 # Reduce magnitude of gradients above this L2 norm
add_value_last_step: True

# --- Agent parameters ---
agent: "rnn" # Default rnn agent
hidden_dim: 64 # Size of hidden state for default rnn agent
obs_agent_id: True # Include the agent's one_hot id in the observation
obs_last_action: True # Include the agent's last action (one_hot) in the observation

# --- Experiment running params ---
repeat_id: 1
label: "default_label"
hypergroup: null